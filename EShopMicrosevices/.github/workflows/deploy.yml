name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [ completed ]
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/eshop

jobs:
  deploy:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push CatalogAPI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/Catalog/CatalogAPI/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-catalog:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-catalog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push BasketAPI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/Basket/BasketAPI/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-basket:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-basket:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push DiscountGrpc
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/Discount/DiscountGrpc/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-discount:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-discount:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push OrderingAPI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/Ordering/OrderingAPI/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ordering:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ordering:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push YarpApiGateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/ApiGateways/YarpApiGateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify deployment success
        run: echo "All images pushed to ${{ env.REGISTRY }} with tag ${{ github.sha }}"
